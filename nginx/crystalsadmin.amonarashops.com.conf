
server {
    server_name crystalsadmin.amonarashops.com ;
    return 301 https://$host$request_uri;

    listen       80 ;
    listen       [::]:80 ;

}

server {
    server_name crystalsadmin.amonarashops.com; # managed by Certbot 
        root         /home/ubuntu/crystalsite/admin-frontend/dist;
        index index.html;

        location / {
          try_files $uri $uri/ /index.html;
        }

        access_log  /var/log/nginx/crystalsadmin.amonarashops.com.access.log ;
        error_log /var/log/nginx/crystalsadmin.amonarashops.com.error.log error;

        error_page 404 /404.html;
            location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
            location = /50x.html {
        }


    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate  /etc/letsencrypt/live/crystalsadmin.amonarashops.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key  /etc/letsencrypt/live/crystalsadmin.amonarashops.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
